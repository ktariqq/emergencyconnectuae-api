# Server
server.port=8443
server.ssl.key-store=classpath:keystore.p12
server.ssl.key-store-password=yourssl123
server.ssl.key-store-type=PKCS12
server.ssl.key-alias=emergencyconnect

# MySQL
spring.datasource.url=jdbc:mysql://localhost:3306/emergencyconnectuae
spring.datasource.username=user
spring.datasource.password=user
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Redis
spring.data.redis.host=localhost
spring.data.redis.port=6379

# Spring Session
spring.session.store-type=redis
spring.session.timeout=1800

# JWT
jwt.secret=a-very-long-secret-key-at-least-256-bits-long-for-hs256
jwt.expiration=86400000

# Actuator
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always

# Swagger
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/api-docs

# App
app.rate-limit.requests-per-minute=100
app.rate-limit.dispatcher-requests-per-minute=500